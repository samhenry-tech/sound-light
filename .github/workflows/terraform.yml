name: Terraform

# Plan on pull requests, apply on push to main. Only triggers on infra changes
# (and manual dispatch).
on:
  pull_request:
    paths:
      - infra/**
      - .github/workflows/terraform.yml
  push:
    branches:
      - main
    paths:
      - infra/**
      - .github/workflows/terraform.yml
  workflow_dispatch:

# pull-requests:write so plan output can be posted as a comment.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  # Google OAuth client id consumed by Terraform as a TF_VAR_* env var
  # (see variables.tf: google_client_id). No client secret is needed —
  # the identity pool verifies Google ID tokens directly.
  TF_VAR_google_client_id: ${{ secrets.TF_VAR_google_client_id }}
  AWS_REGION: ap-southeast-2

jobs:
  terraform:
    name: Terraform plan/apply
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # AWS credentials provided as org-level secrets for samhenry-tech public repos.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904581404707:role/deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform -chdir=infra init

      - name: Terraform fmt
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: Terraform plan
        id: plan
        run: terraform -chdir=infra plan -no-color -input=false -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const max = 60000; // stay well under GitHub's comment size limit
            let plan = process.env.PLAN_STDOUT || '(no output)';
            if (plan.length > max) {
              plan = plan.slice(0, max) + '\n... (truncated; see the Action logs for the full plan)';
            }
            const body = [
              `#### Terraform Plan \`${process.env.PLAN_OUTCOME}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${context.actor} for commit ${context.sha}.*`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Apply only on push to main (never on PRs).
      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform -chdir=infra apply -auto-approve -input=false tfplan
