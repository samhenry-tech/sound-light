name: Terraform

# Plan on pull requests, apply on push to main. Only triggers on infra / shared
# config changes (and manual dispatch).
on:
  pull_request:
    paths:
      - infra/**
      - config/**
      - .github/workflows/terraform.yml
  push:
    branches:
      - main
    paths:
      - infra/**
      - config/**
      - .github/workflows/terraform.yml
  workflow_dispatch:

# id-token:write is required for OIDC auth when assuming the AWS deploy role.
# pull-requests:write so plan output can be posted as a comment.
# contents:write so apply can commit the refreshed src/config.generated.json.
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  # Same shared bucket as deploy-frontend.yml (already provisioned for the org).
  AWS_REGION: ap-southeast-2
  S3_BUCKET: projects.samhenry.tech

jobs:
  terraform:
    name: Terraform plan/apply
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # use_lockfile in the S3 backend needs Terraform >= 1.10.
          terraform_version: '1.11.4'
          # Unwrapped CLI so import/state scripts see normal stdout.
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904581404707:role/deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform -chdir=infra init

      # First run (or empty remote state): adopt resources created under the
      # old local backend. No-ops once state already contains them.
      - name: Import existing resources if state is empty
        run: ./infra/scripts/import_existing.sh

      - name: Remove orphan Cognito identity pools
        run: ./infra/scripts/cleanup_orphan_pools.sh

      - name: Terraform fmt
        run: terraform -chdir=infra fmt -check -recursive

      - name: Terraform validate
        run: terraform -chdir=infra validate

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform -chdir=infra plan -no-color -input=false -out=tfplan | tee /tmp/tfplan.txt
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const fs = require('fs');
            const max = 60000;
            let plan = '(no output)';
            try {
              plan = fs.readFileSync('/tmp/tfplan.txt', 'utf8');
            } catch (_) {}
            if (plan.length > max) {
              plan = plan.slice(0, max) + '\n... (truncated; see the Action logs for the full plan)';
            }
            const body = [
              `#### Terraform Plan \`${process.env.PLAN_OUTCOME}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${context.actor} for commit ${context.sha}.*`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Apply only on push to main (never on PRs).
      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform -chdir=infra apply -auto-approve -input=false tfplan

      # Keep the SPA's generated config in sync with Terraform outputs.
      - name: Commit generated frontend config
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python3 -c 'import json, pathlib; p = pathlib.Path("src/config.generated.json"); p.write_text(json.dumps(json.loads(p.read_text()), indent=2) + "\n")'
          git add src/config.generated.json
          if git diff --staged --quiet; then
            echo "src/config.generated.json unchanged"
          else
            git commit -m "chore: sync src/config.generated.json from terraform"
            git push
          fi
