name: Deploy Frontend

# Build the SPA and publish it to the shared projects.samhenry.tech S3 bucket
# (served by the shared CloudFront distribution). Deploys into a per-repo
# subfolder so multiple projects share one bucket + distribution.
on:
  push:
    branches:
      - main
    paths:
      - src/**
      - config/**
      - public/**
      - index.html
      - package.json
      - package-lock.json
      - vite.config.ts
      - tsconfig*.json
      - .github/workflows/deploy-frontend.yml
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  S3_BUCKET: projects.samhenry.tech
  S3_FOLDER: ${{ github.event.repository.name }}

# id-token: write lets the job assume the shared deploy role via GitHub OIDC.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy SPA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # Served from the root of sound-light.samhenry.tech (the distribution
        # maps that host to the sound-light/ folder), so the default "/" base
        # is correct — no --base override needed. Public client config lives
        # in src/config.ts (baked in at build time; PROD disables Spotify mock).
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904581404707:role/deploy-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Create S3 folder if it doesn't exist
        run: aws s3api put-object --bucket "${{ env.S3_BUCKET }}" --key "${{ env.S3_FOLDER }}/" || true

      - name: Upload to S3
        run: aws s3 sync dist/ "s3://${{ env.S3_BUCKET }}/${{ env.S3_FOLDER }}/" --delete --region ${{ env.AWS_REGION }}

      - name: Verify deployed SPA
        # CloudFront may geo-restrict this runner, so validate the bucket
        # contents directly (index + Cognito pool id baked into the JS bundle).
        run: |
          set -euo pipefail
          aws s3api head-object \
            --bucket "${{ env.S3_BUCKET }}" \
            --key "${{ env.S3_FOLDER }}/index.html" >/dev/null
          POOL_ID="$(python3 -c 'import json; print(json.load(open("src/config.generated.json"))["cognitoIdentityPoolId"])')"
          JS_KEY="$(
            aws s3api list-objects-v2 \
              --bucket "${{ env.S3_BUCKET }}" \
              --prefix "${{ env.S3_FOLDER }}/assets/" \
              --query "reverse(sort_by(Contents[?ends_with(Key, '.js') && !ends_with(Key, '.map') && contains(Key, '/index-')], &LastModified))[0].Key" \
              --output text
          )"
          echo "Checking s3://${{ env.S3_BUCKET }}/${JS_KEY} for Cognito pool ${POOL_ID}"
          aws s3 cp "s3://${{ env.S3_BUCKET }}/${JS_KEY}" - | grep -F -q "$POOL_ID"
          echo "Deploy verification OK"

      - name: Invalidate CloudFront
        # The distribution serves this app at its own host root, so invalidate
        # from root.
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.SAMHENRY_TECH_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
